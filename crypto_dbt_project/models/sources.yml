version: 2

sources:
  - name: raw
    database: crypto_analytics
    schema: crypto_analytics
    tables:
      - name: raw_crypto_prices
        description: Raw CoinGecko crypto price events ingested from Kafka into ClickHouse

      - name: raw_crypto_ticker_events
        description: Raw Binance WebSocket ticker events ingested from Kafka into ClickHouse

      - name: failed_crypto_events
        description: Invalid or failed crypto events captured during ingestion

      - name: producer_api_metrics
        description: Producer-side API and Kafka publishing metrics

      - name: consumer_processing_metrics
        description: Consumer-side Kafka processing and ClickHouse insert metrics